server {
    listen 80;
    server_name reuniones.batidospitaya.com;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name reuniones.batidospitaya.com;

    # ── SSL (gestionado por certbot) ──────────────────────────
    ssl_certificate     /etc/letsencrypt/live/reuniones.batidospitaya.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reuniones.batidospitaya.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Logs ──────────────────────────────────────────────────
    access_log /var/log/nginx/reuniones-batidospitaya-access.log;
    error_log  /var/log/nginx/reuniones-batidospitaya-error.log;

    # ── Tamaño máximo de upload (chunks de audio de 60s) ─────
    client_max_body_size 200M;

    # ── Timeouts extendidos (uploads de audio pueden tardar) ──
    proxy_connect_timeout 30s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    # ── API FastAPI (todos los endpoints /api/* y /health) ────
    location /api/ {
        proxy_pass         http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    location /health {
        proxy_pass         http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Archivos estáticos (página de grabación) ──────────────
    # FastAPI los sirve via StaticFiles mount en "/"
    location / {
        proxy_pass         http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
